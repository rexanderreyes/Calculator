<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="root">
      <div id="r-top">
        <div id="rt-nums">
          <input id="rts-solution" placeholder="..." />
          <input id="rts-answer" placeholder="0" />
        </div>
      </div>

      <div id="r-bottom">
        <div id="clear" class="rb-btn function">C</div>
        <div id="rate" class="rb-btn function">%</div>
        <div id="erase" class="rb-btn function">Er.</div>
        <div id="divide" class="rb-btn operation">÷</div>

        <div id="7" class="rb-btn">7</div>
        <div id="8" class="rb-btn">8</div>
        <div id="9" class="rb-btn">9</div>
        <div id="multiply" class="rb-btn operation">×</div>

        <div id="4" class="rb-btn">4</div>
        <div id="5" class="rb-btn">5</div>
        <div id="6" class="rb-btn">6</div>
        <div id="subtract" class="rb-btn operation">-</div>

        <div id="1" class="rb-btn">1</div>
        <div id="2" class="rb-btn">2</div>
        <div id="3" class="rb-btn">3</div>
        <div id="add" class="rb-btn operation">+</div>

        <div class="rb-btn"></div>
        <div id="0" class="rb-btn">0</div>
        <div id="decimal" class="rb-btn">.</div>
        <div id="equals" class="rb-btn operation">=</div>
      </div>
    </div>

    <script src="./scripts.js"></script>
  </body>
</html>
